# MCP server configuration for ADP.
#
# ADP will read this file on startup. If it is empty or missing, MCP is silently
# disabled and the pipeline runs exactly as before.
#
# Each [[servers]] entry defines one MCP server to connect to.
# The Decomposer will see its tools and may assign them to micro-tasks.
#
# TRANSPORT OPTIONS:
#   stdio — ADP launches the server as a subprocess (most common for npm servers)
#   sse   — ADP connects to a running HTTP SSE server at the given URL
#
# EXAMPLES (uncomment and edit to enable):
# ---------------------------------------------------------------------------

# --- Filesystem server (read/write local files) ---
[[servers]]
name    = "filesystem"
transport = "stdio"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-filesystem", "/home/bittu/Desktop/tmp"]

# --- Git server (log, diff, show) ---
# [[servers]]
# name    = "git"
# transport = "stdio"
# command = "uvx"
# args    = ["mcp-server-git", "--repository", "."]

# --- Free web search server (no API key) ---
[[servers]]
name      = "web_search"
transport = "stdio"
command   = "npx"
args      = ["-y", "open-websearch@latest"]
[servers.env]
MODE = "stdio"
DEFAULT_SEARCH_ENGINE = "startpage"
ALLOWED_SEARCH_ENGINES = "startpage,duckduckgo"

